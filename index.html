<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Salina Styles | Kurti Collection</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background-color: #fafafa;
      color: #333;
    }

    header {
      background: linear-gradient(to right, #f8cdda, #f7a1c4);
      padding: 20px;
      text-align: center;
      color: #fff;
    }

    header h1 { font-size: 28px; }

    nav {
      display: flex;
      justify-content: center;
      gap: 20px;
      background: #fff;
      padding: 12px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.05);
    }

    nav a {
      text-decoration: none;
      color: #555;
      font-weight: 600;
    }

    nav a:hover { color: #e91e63; }

    .hero {
      height: 250px;
      background: url('https://images.unsplash.com/photo-1581044777550-4cfa60707c03') center/cover;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 26px;
      font-weight: bold;
    }

    .container {
      padding: 30px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 25px;
    }

    .card {
      background: white;
      border-radius: 15px;
      overflow: hidden;
      box-shadow: 0 5px 15px rgba(0,0,0,0.08);
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    .card img {
      width: 100%;
      height: 260px;
      object-fit: cover;
    }

    .card-content {
      padding: 15px;
      text-align: center;
    }

    .card h3 {
      margin-bottom: 8px;
    }

    .price {
      color: #e91e63;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .btn {
      background: #e91e63;
      color: white;
      border: none;
      padding: 8px 15px;
      border-radius: 20px;
      cursor: pointer;
    }

    .btn:hover { background: #c2185b; }

    footer {
      text-align: center;
      padding: 15px;
      background: #333;
      color: white;
      margin-top: 20px;
    }
  </style>
</head>
<body>

<header>
  <h1>Salina Styles</h1>
  <p>Affordable Daily Wear Kurtis</p>
</header>

<nav>
  <a href="#">Home</a>
  <a href="#">New Arrivals</a>
  <a href="#">Best Sellers</a>
  <a href="#">Contact</a>
</nav>

<div class="hero">
  Discover Your Perfect Kurti ✨
</div>

<div class="container">

  <div class="card">
    <img src="https://images.unsplash.com/photo-1602810318383-e386cc2a3ccf" alt="Kurti 1">
    <div class="card-content">
      <h3>Floral Kurti</h3>
      <p class="price">Rs. 1500</p>
      <button class="btn">Add to Cart</button>
    </div>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1593032465171-8eeb5f4a6c3f" alt="Kurti 2">
    <div class="card-content">
      <h3>Casual Cotton Kurti</h3>
      <p class="price">Rs. 1200</p>
      <button class="btn">Add to Cart</button>
    </div>
  </div>

  <div class="card">
    <img src="https://github.com/anushashrestha227-jpg/salina1/blob/2c56ad3fd3ba79b8d448cd77d2ea0e60bc7af6c3/120795a1-ea19-4d0e-b4f2-dc85c5edff64.jpg">
    <div class="card-content">
      <h3>Elegant Party Kurti</h3>
      <p class="price">Rs. 2200</p>
      <button class="btn">Add to Cart</button>
    </div>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1622445275463-afa2ab738c34" alt="Kurti 4">
    <div class="card-content">
      <h3>Printed Daily Kurti</h3>
      <p class="price">Rs. 1300</p>
      <button class="btn">Add to Cart</button>
    </div>
  </div>

</div>

<footer>
  <p>© 2026 Salina Styles | Designed for BBA Project</p>
</footer>

</body>
</html>
